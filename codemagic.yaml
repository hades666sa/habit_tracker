# Codemagic Flutter CI/CD Configuration
# Docs: https://docs.codemagic.io/yaml/

workflows:
  ios-build:
    name: iOS Build & TestFlight
    max_build_duration: 60
    60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    # Required for widget extension
    scripts:
      - name: Set up Flutter
        script: |
          flutter --version
      
      - name: Get dependencies
        script: |
          flutter pub get
      
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..
      
      - name: Build iOS (Debug)
        script: |
          flutter build ios --debug \
            --build-name=$(git describe --tags --always --dirty 2>/dev/null || echo "1.0.0") \
            --build-number=$BUILD_NUMBER
      
      - name: Build iOS (Release) for TestFlight
        script: |
          flutter build ios --release \
            --build-name=$(git describe --tags --always --dirty 2>/dev/null || echo "1.0.0") \
            --build-number=$BUILD_NUMBER \
            --no-codesign
    artifacts:
      - build/ios/debug/**/*
      - build/ios/iphoneos/**/*
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  ios-release:
    name: iOS Release to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    # Required for widget extension
    scripts:
      - name: Set up Flutter
        script: |
          flutter --version
      
      - name: Get dependencies
        script: |
          flutter pub get
      
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..
      
      - name: Build iOS Release with Code Signing
        script: |
          # Import certificates
          KEYCHAIN_PATH=$HOME/Library/Keychains/login.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # Import distribution certificate
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k $KEYCHAIN_PATH -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm certificate.p12
          
          # Import provisioning profiles
          mkdir -p $HOME/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_MAIN_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/main.mobileprovision"
          echo "$PROVISIONING_PROFILE_WIDGET_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/widget.mobileprovision"
          
          # Build with automatic code signing
          flutter build ios --release \
            --build-name=$(git describe --tags --always --dirty 2>/dev/null || echo "1.0.0") \
            --build-number=$BUILD_NUMBER
          
          # Archive
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            -allowProvisioningUpdates \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER \
            MARKETING_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "1.0.0") \
            clean archive
          
          # Export IPA
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist
          
          cd ..
      
      - name: Upload to TestFlight
        script: |
          cd ios
          # Install fastlane
          gem install fastlane -N
          
          # Upload using App Store Connect API
          fastlane pilot upload \
            --ipa build/ipa/Runner.ipa \
            --api_key_id "$ASC_API_KEY_ID" \
            --api_key_issuer "$ASC_API_KEY_ISSUER" \
            --api_key_content "$ASC_API_KEY_CONTENT" \
            --skip_waiting_for_build_processing
    artifacts:
      - ios/build/ipa/Runner.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $ASC_API_KEY_ID
        api_key_path: $ASC_API_KEY_CONTENT
        api_issuer: $ASC_API_KEY_ISSUER
        submit_to_testflight: true
        beta_groups:
          - External Testers

  android-build:
    name: Android Build
    max_build_duration: 60
    instance_type: linux
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: flutter pub get
      
      - name: Build Android Debug
        script: |
          flutter build apk --debug \
            --build-name=$(git describe --tags --always --dirty 2>/dev/null || echo "1.0.0") \
            --build-number=$BUILD_NUMBER
      
      - name: Build Android Release
        script: |
          flutter build apk --release \
            --build-name=$(git describe --tags --always --dirty 2>/dev/null || echo "1.0.0") \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/app/outputs/flutter-apk/**/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com

  web-build:
    name: Web Build
    max_build_duration: 30
    instance_type: linux
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: flutter pub get
      
      - name: Build Web
        script: |
          flutter build web --release \
            --build-name=$(git describe --tags --always --dirty 2>/dev/null || echo "1.0.0") \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/web/**/*
    publishing:
      email:
        recipients:
          - your-email@example.com

# Trigger configuration
triggering:
  events:
    - push
    - pull_request
    - tag
  branch_patterns:
    - pattern: 'main'
      include: true
      workflows:
        - ios-build
        - android-build
        - web-build
    - pattern: 'release/*'
      include: true
      workflows:
        - ios-release
        - android-build
        - web-build
    - pattern: 'v*'
      include: true
      workflows:
        - ios-release
        - android-build
        - web-build